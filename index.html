<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoParts 360</title>

    <link rel="stylesheet" href="style.css">
</head>
<div id="devPanel" style="
position:fixed;
left:20px;
bottom:20px;
background:#222;
color:#fff;
padding:15px;
border-radius:10px;
display:none;
z-index:9999;
">

<p>الكاميرا Z</p>
<input id="camZ" type="range" min="2" max="15" step="0.1" value="6">

<p>الكاميرا Y</p>
<input id="camY" type="range" min="0" max="6" step="0.1" value="2">

<p>Scale</p>
<input id="scale" type="range" min="0.5" max="2" step="0.01" value="1">

</div>
<body>

<header>
    AutoParts 360
</header>

<div class="container">
    <div class="topTools">

    <button id="hoodToggle">
        🔧 فتح الكبوت
    </button>

</div>

    <div class="card">

        <h2>اختر سيارتك</h2>

        <label>الشركة</label>
        <select id="brand">
            <option value="Honda">Honda</option>
        </select>

        <label>الموديل</label>
        <select id="model">
            <option value="Accord">Accord</option>
        </select>

        <label>السنة</label>
        <select id="year">
            <option value="2007">2007</option>
            <option value="2008">2008</option>
            <option value="2017" selected>2017</option>

            <option value="2018">2018</option>
            <option value="2019">2019</option>
            <option value="2024">2024</option>
        </select>

        <div class="car">
            

            <div id="viewer"></div>
            <button id="hoodBtn" class="hood-btn">

          🚗 فتح الكبوت
          
         </button>


            <div id="partInfo" class="part-info">

                <div class="part-image">
                    <img id="partImage" src="images/no-image.png" alt="صورة القطعة">
                </div>

                <h3 id="partName">اسم القطعة</h3>

                <p>💰 السعر: <span id="partPrice"></span> ريال</p>

                <p>🔢 رقم القطعة: <span id="partNumber"></span></p>

                <p>📦 الحالة: <span id="partStock"></span></p>
                <hr>

                <p><strong>📝 الوصف</strong></p>
                <p id="partDescription">لا يوجد وصف</p>

                <hr>

                <h4>🔩 القطع المرتبطة او الداخلية</h4>

                <div id="relatedParts" class="related-parts">

                </div>
                <div class="buttons">
                    <button id="buyBtn">🛒 شراء</button>
                    <button id="closeInfo">إغلاق</button>
                </div>

            </div>

        </div>

    </div>

    <p style="text-align:center;font-size:20px">
        اضغط على أي قطعة لمعرفة السعر
    </p>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
  }
}
</script>
<button id="adminBtn">
⚙️ الإدارة
</button>
<script type="module" src="script.js"></script>

</body>
</html>
