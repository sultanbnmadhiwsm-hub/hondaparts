<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoParts 360</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    AutoParts 360
</header>

<div class="container">

    <div class="card">

        <h2>اختر سيارتك</h2>

        <label>الشركة</label>
        <select>
            <option>Honda</option>
        </select>

        <label>الموديل</label>
        <select>
            <option>Accord</option>
        </select>

        <label>السنة</label>
        <select>
            <option>2024</option>
            <option>2023</option>
            <option>2022</option>
            <option>2021</option>
        </select>

        <div class="car">

            <div id="viewer"></div>

            <div id="partInfo" class="part-info">

                <div class="part-image">
                    <img id="partImage" src="images/no-image.png" alt="صورة القطعة">
                </div>

                <h3 id="partName">اسم القطعة</h3>

                <p>💰 السعر: <span id="partPrice"></span> ريال</p>

                <p>🔢 رقم القطعة: <span id="partNumber"></span></p>

                <p>📦 الحالة: <span id="partStock"></span></p>

                <div class="buttons">
                    <button id="buyBtn">🛒 شراء</button>
                    <button id="closeInfo">إغلاق</button>
                </div>

            </div>

        </div>

    </div>

    <p style="text-align:center;font-size:20px">
        اضغط على أي قطعة لمعرفة السعر
    </p>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
  }
}
</script>

<script type="module" src="script.js"></script>

</body>

</html>
