<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>لوحة التحكم</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="panel">

<h1>لوحة التحكم</h1>

<h2>اختر القطعة</h2>

<select id="allParts"></select>

<hr>
<label>معرف القطعة (ID)</label>
<input
    type="text"
    id="id"
    placeholder="مثال: Front_Bumper">

<input id="name" placeholder="اسم القطعة">

<input id="number" placeholder="رقم القطعة">

<input id="price" placeholder="السعر">

<input id="stock" placeholder="الحالة">

<label>رابط المنتج</label>
<input id="url" type="text" placeholder="ضع رابط المنتج هنا">

<input id="image" placeholder="رابط الصورة">

<textarea id="description" placeholder="الوصف"></textarea>

<hr>

<h2>القطع المرتبطة</h2>

<div id="relatedList"></div>

<label>اختر قطعة لإضافتها</label>

<select id="partsSelect"></select>

<button id="addRelated">
➕ إضافة قطعة مرتبطة
</button>

<hr>

<button id="save">
💾 حفظ
</button>
<button id="delete">
    🗑️ حذف الصنف
</button>
<textarea id="outputCode" 
style="width:100%;height:250px;margin-top:20px;"
placeholder="سيظهر الكود هنا"></textarea>
</div>

<script type="module" src="admin.js"></script>

</body>
</html>
